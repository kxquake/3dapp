<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V Studios</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand brand-logo" href="#">
                <span class="brand-mark">V</span>V Studios
                <small class="brand-tagline">3D Design & Development</small>
            </a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#" onclick="showSection('home')">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="showSection('gallery')">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="showSection('about')">About</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section id="home-section" class="content-section">
        <div class="container py-5">
            <h1 class="display-4">Interactive 3D gallery</h1>
            <div class="row mt-5">
                <div class="col-md-4">
                    <div class="card product-card" onclick="loadProduct(1)">
                        <img src="images/product1.jpg" class="card-img-top" alt="Vinyl Record">
                        <div class="card-body">
                            <h5 class="card-title">Vinyl Record</h5>
                            <p class="card-text">CD in Vinyl.</p>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card product-card" onclick="loadProduct(2)">
                        <img src="images/product2.jpg" class="card-img-top" alt="Speakers">
                        <div class="card-body">
                            <h5 class="card-title">3D Render 2 - Speakers</h5>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card product-card" onclick="loadProduct(3)">
                        <img src="images/product3.jpg" class="card-img-top" alt="Headphones">
                        <div class="card-body">
                            <h5 class="card-title">Headphones</h5>
                            <p class="card-text">Sleek Headphone design.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>


    <section id="products-section" class="content-section" style="display:none;">
        <div class="container py-4">
            <div class="row">

                <div class="col-lg-8">
                    <div class="card">
                        <div class="card-body p-0">
                            <div id="threejs-container"></div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="card mb-3">
                        <div class="card-body">
                            <h6 class="card-subtitle mb-2 text-muted">Select Model</h6>
                            <div class="btn-group" role="group">
                                <button class="btn btn-outline-primary" onclick="loadProduct(1)">Vinyl</button>
                                <button class="btn btn-outline-primary" onclick="loadProduct(2)">Speakers</button>
                                <button class="btn btn-outline-primary" onclick="loadProduct(3)">Headphones</button>
                            </div>
                        </div>
                    </div>

                    <div class="card mb-3">
                        <div class="card-body">
                            <h6 class="card-subtitle mb-2 text-muted">Controls</h6>
                            <button class="btn btn-sm btn-secondary m-1" onclick="toggleWireframe()">Toggle Wireframe</button>
                            <button class="btn btn-sm btn-secondary m-1" onclick="toggleRotate()">Auto-Rotate</button>
                            <button class="btn btn-sm btn-secondary m-1" onclick="playAnimation()">Play Animation</button>
                            <button class="btn btn-sm btn-secondary m-1" onclick="playSound()">Play Sound</button>
                        </div>
                    </div>

                    <div class="card mb-3">
                        <div class="card-body">
                            <h6 class="card-subtitle mb-2 text-muted">Camera</h6>
                            <button class="btn btn-sm btn-info m-1" onclick="setCamera('front')">Front</button>
                            <button class="btn btn-sm btn-info m-1" onclick="setCamera('top')">Top</button>
                            <button class="btn btn-sm btn-info m-1" onclick="setCamera('hero')">Hero</button>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-body">
                            <h6 class="card-subtitle mb-2 text-muted">Lighting</h6>
                            <button class="btn btn-sm btn-warning m-1" onclick="toggleLight('spot light')">Spot Light</button>
                            <label class="d-block mt-2">Intensity
                                <input type="range" min="0" max="100" step="0.1" value="1" oninput="setLightIntensity(this.value)">
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row mt-4">
                <div class="col-12">
                    <h4>Gallery</h4>
                    <div id="gallery-row" class="row"></div>
                </div>
            </div>
        </div>
    </section>


    <section id="about-section" class="content-section" style="display:none;">
        <div class="container py-4">
            <h2>About this 3D App</h2>
            <div id="about-content">Loading...</div>
        </div>
    </section>

    <footer class="bg-dark text-light py-3 mt-5">
        <div class="container text-center">
            <small>&copy; 2026 V Studios </small>
        </div>
    </footer>


    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="js/main.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/getJsonData.js"></script>

</body>
</html>
